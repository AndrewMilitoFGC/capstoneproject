<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main>
      <h1>Text summarization</h1>
      <p class="lead">
        Upload a plain-text <code>.txt</code> file. The app sends it to Groq and shows the original
        text next to an AI-generated summary.
      </p>

      <section class="card" aria-labelledby="upload-heading">
        <h2 id="upload-heading" class="visually-hidden">Upload</h2>
        <form id="upload-form" enctype="multipart/form-data">
          <div class="upload-row">
            <input type="file" name="file" accept=".txt,text/plain" required />
            <button type="submit" id="submit-btn">Summarize</button>
          </div>
          <p class="hint">Only <strong>.txt</strong> files are accepted. Large files may be truncated.</p>
        </form>
        <div id="banner" class="banner" role="status" aria-live="polite"></div>
      </section>

      <section class="grid" aria-label="Results">
        <article class="panel">
          <h2>Original</h2>
          <div id="original-text" class="scroll-area" tabindex="0"></div>
        </article>
        <article class="panel">
          <h2>Summary</h2>
          <div id="summary-text" class="scroll-area" tabindex="0"></div>
        </article>
      </section>
    </main>
    <style>
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
  </body>
</html>
